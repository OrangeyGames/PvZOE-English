<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cocos Creator | pza</title>

  <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1, minimum-scale=1,maximum-scale=1"/>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">

  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">

  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>
  
  <meta name="screen-orientation" content="landscape"/>
  <meta name="x5-orientation" content="landscape">
  <meta name="x5-page-mode" content="app">

  <link rel="stylesheet" type="text/css" href="style-mobile.25fc5.css"/>
  <link rel="icon" href="favicon.8de18.ico"/>
</head>

<body>

<!-- PASSWORD OVERLAY -->
<div id="passwordOverlay" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  flex-direction:column;
  color:white;
  font-family:sans-serif;
">
  <h2>Enter Password</h2>
  <input type="password" id="passwordInput" style="padding:10px; font-size:16px;">
  <button onclick="checkPassword()" style="margin-top:10px; padding:10px 20px; font-size:16px;">Enter</button>
  <p id="errorText" style="color:red; display:none;">Wrong password</p>
</div>

<canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>

<div id="splash">
  <div class="progress-bar stripes">
    <span style="width: 0%"></span>
  </div>
</div>

<script src="src/settings.3fc41.js" charset="utf-8"></script>
<script src="main.69474.js" charset="utf-8"></script>

<script>
function decodePass() {
  var encoded = "bXlqZW1hZw=="; // reversed + base64
  var reversed = atob(encoded);
  return reversed.split("").reverse().join("");
}

function checkPassword() {
  var input = document.getElementById("passwordInput").value;
  if (input === decodePass()) {
    document.getElementById("passwordOverlay").style.display = "none";
  } else {
    document.getElementById("errorText").style.display = "block";
  }
}

window.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    checkPassword();
  }
});
</script>

<script type="text/javascript">
(function () {
    if (typeof VConsole !== 'undefined') {
        window.vConsole = new VConsole();
    }

    var debug = window._CCSettings.debug;
    var splash = document.getElementById('splash');
    splash.style.display = 'block';

    function loadScript (moduleName, cb) {
      function scriptLoaded () {
          document.body.removeChild(domScript);
          domScript.removeEventListener('load', scriptLoaded, false);
          cb && cb();
      };
      var domScript = document.createElement('script');
      domScript.async = true;
      domScript.src = moduleName;
      domScript.addEventListener('load', scriptLoaded, false);
      document.body.appendChild(domScript);
    }

    loadScript(debug ? 'cocos2d-js.js' : 'cocos2d-js-min.c5d55.js', function () {
      if (CC_PHYSICS_BUILTIN || CC_PHYSICS_CANNON) {
        loadScript(debug ? 'physics.js' : 'physics-min.js', window.boot);
      }
      else {
        window.boot();
      }
    });
})();
</script>

</body>
</html>
